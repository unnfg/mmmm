name: CI
on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: 3.14

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - uses: j178/prek-action@v2

      - name: Run tests
        run: uv run bash scripts/test.sh