name: Lint
on:
  push:
    branches: [main]
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev

      - uses: j178/prek-action@v2